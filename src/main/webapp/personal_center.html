<script src="js/util.js"></script>
<script>
  function onloadUserInfo(){
    let un = document.getElementById("username");
    let uid = document.getElementById("userId");
    let Email = document.getElementById("email");
    let bio = document.getElementById("bio");
    let img = document.getElementById("avatarImg");
    ajax({
      method: "Get",
      url: "UserInfo",
      callback: function(status,responseText){
        if(status == 200){
          let json = JSON.parse(responseText);
          if(json.ok){
            let data = json.data;
            let user =data.user;
            un.value = user.username;
            uid.value = user.id;
            Email.value = user.email;
            bio.value = user.biography;

            if (user.avatar!=null){
              img.src = user.avatar;
            }

          }else {
            alert("ok==false");
          }
        }else {
          alert("响应状态码："+status+"/nbody："+responseText)
        }
      }
    });
  }


  // 其他代码保持不变
  let myInfo = document.querySelector(".active");
  let myAva = document.querySelector(".myAva");
  let myPas = document.querySelector(".myPas");

  let personal = document.querySelector(".personal");
  let avatarss = document.querySelector(".avatarss");
  let password = document.querySelector(".password");

  //点击我的信息时
  function myInfos() {
    personal.style.display = "";
    avatarss.style.display = "none";
    password.style.display = "none";

    myPas.style.background = "transparent";
    myInfo.style.background = "linear-gradient(to right, #add8e6, #1772f6)";
    myAva.style.background = "transparent";

  }

  //点击我的头像时
  function myAvas() {
    password.style.display = "none";
    personal.style.display = "none";
    avatarss.style.display = "";
    myAva.style.background = "linear-gradient(to right, #add8e6, #1772f6)";
    myInfo.style.background = "transparent";
    myPas.style.background = "transparent";

  }

  //点击密码管理时
  function myPass() {
    personal.style.display = "none";
    avatarss.style.display = "none";
    password.style.display = "";

    myPas.style.background = "linear-gradient(to right, #add8e6, #1772f6)";
    myInfo.style.background = "transparent";
    myAva.style.background = "transparent";

  }




  function toggleEditMode() {
    let elements = document.getElementsByClassName('editable');
    let saveChangesBtn = document.getElementById("saveChangesBtn");
    let edit = document.getElementById("edit");
    let cancle = document.getElementById("cancle");
    let inputs = document.getElementsByTagName('input');
    // let con = document.querySelector('.con');
    // let ins = document.querySelector('.ins');

    for (let i = 0; i < elements.length; i++) {
      elements[i].contentEditable = !elements[i].isContentEditable;
    }

    edit.style.display = "none";
    cancle.style.display = "";
    saveChangesBtn.style.display = "";
    // ins.style.border = "solid grey 1px"
    inputs.readOnly = false;
    for (let i = 0; i < inputs.length; i++) {
      inputs[i].readOnly = false;
    }
    // con.style.borderRadius = "10px";
    // saveChangesBtn.style.display = saveChangesBtn.style.display === "none" ? "block" : "none";
  }
  function saveChanges() {
    // 实现保存更改
    let un = document.getElementById("username").value;
    let Email = document.getElementById("email").value;
    let bio = document.getElementById("bio").value;

    ajax({
      method: "Post",
      url: "UserInfo",
      contentType: "application/json",
      body: JSON.stringify({
        username:un,
        email:Email,
        biography:bio
      }),
      callback: function(status,responseText){
        if(status == 200){
          let json = JSON.parse(responseText);
          if(json.ok){
            alert("修改用户信息成功");
          }else {
            alert("ok == false");
          }
        }else {
          alert("响应状态码："+status+"/nbody："+responseText);
        }
      }
    });

  }

  function checkSame(){
    let cp = document.getElementById("currentPassword");
    let currentPassword = cp.value;
    ajax({
      method: "Post",
      url: "CheckServlet",
      contentType: "application/json",
      body: JSON.stringify({
        password:currentPassword
      }),
      callback: function(status,responseText){
        if(status == 200){
          let json = JSON.parse(responseText);
          if(json.ok){
            alert("验证成功");
          }else {
            alert("当前输入的密码有误!");
          }
        }else {
          alert("响应状态码："+status+"/nbody："+responseText)
        }
      }
    });
  }

  function cancle() {
    //取消
    let cancle = document.getElementById("cancle");
    let saveChangesBtn = document.getElementById("saveChangesBtn");
    let edit = document.getElementById("edit");
    let elements = document.getElementsByClassName('editable');
    let inputs = document.getElementsByTagName('input');

    for (let i = 0; i < elements.length; i++) {
      elements[i].contentEditable = false;
    }

    saveChangesBtn.style.display = "none";
    edit.style.display = "";
    cancle.style.display = "none";
    inputs.readOnly = true;
    inputs.disabled=true;
    for (let i = 0; i < inputs.length; i++) {
      inputs[i].readOnly = true;
    }
  }

  function limitInputLength(inputElement, maxLength) {
    if (inputElement.value.length > maxLength) {
      inputElement.value = inputElement.value.slice(0, maxLength);
    }
  }

  function saveAvatar() {
    let fileInput = document.getElementById('avatarInput');
    //let avatarImg = document.getElementById('avatarImg');

    let file = fileInput.files[0];

    if (file) {
      // 创建一个 FileReader 对象来读取文件
      let reader = new FileReader();
      reader.onload = function (e) {
        // 将读取到的文件内容设置为新头像的 src
        let base64String = e.target.result;
        ajax({
          method: "Post",
          url: "AvatarServlet",
          contentType: "application/json",
          body: JSON.stringify({
            avatar: base64String
          }),
          callback: function (status, responseText) {
            if (status == 200) {
              let json = JSON.parse(responseText);
              if (json.ok) {
                alert("换头像成功");
                updateOtherAvatar();
              } else {
                alert("换头像有误!");
              }
            } else {
              alert(base64String);
              alert("响应状态码：" + status + "/nbody：" + responseText)
            }
          }
        });
        // 同时更新其他位置的头像
      };
      // 读取文件内容
      reader.readAsDataURL(file);
    }
  }

    function updateOtherAvatar() {
      // 获取其他位置的头像元素，并更新其 src 属性，上传头像
      let img = document.getElementById("avatarImg");
      ajax({
        method: "Get",
        url: "AvatarServlet",
        contentType: "application/json",
        callback: function (status, responseText) {
          if (status == 200) {
            let json = JSON.parse(responseText);
            if (json.ok) {
              let avatar = json.data;
              img.src = avatar;
            } else {
              alert("头像显示有误");
            }
          } else {
            alert(base64String);
            alert("响应状态码：" + status + "/nbody：" + responseText)
          }
        }
      });

    }

    function changePassword() {
      let cp = document.getElementById("currentPassword");
      let np = document.getElementById("newPassword");
      let currentPassword = cp.value;
      let newPassword = np.value;

      if (currentPassword == newPassword) {
        alert("当前密码和新密码一致！")
      } else {
        ajax({
          method: "Post",
          url: "UserPassword",
          contentType: "application/json",
          body: JSON.stringify({
            password: newPassword
          }),
          callback: function (status, responseText) {
            if (status == 200) {
              let json = JSON.parse(responseText);
              if (json.ok) {
                alert("修改密码成功");
              } else {
                alert("ok == false");
              }
            } else {
              alert("响应状态码：" + status + "/nbody：" + responseText)
            }
          }
        });
      }
    }
</script>
