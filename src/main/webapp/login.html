<script>
        document.addEventListener('DOMContentLoaded', function () {
            // 密码强度计算逻辑（你可以根据具体需求调整）
            let passwordInput = document.getElementById('newPassword');
            if (passwordInput) {
                passwordInput.addEventListener('input', function () {
                    console.log('Input event triggered');
                    let password = passwordInput.value;
                    let strengthBar = document.getElementById('password-strength-bar');
                    let strengthText = document.getElementById('password-strength-text');

                    let strength = 0;
                    if (password.match(/[a-zA-Z0-9]+/)) {
                        strength += 1;
                    }
                    if (password.match(/[~!@#$%^&*()_+{}":;'<>?/\-=[\]\\]+/)) {
                        strength += 1;
                    }
                    if (password.length >= 8) {
                        strength += 1;
                    }

                    switch (strength) {
                        case 1:
                            strengthBar.value = 33;
                            strengthText.innerHTML = '密码安全程度：弱';
                            break;
                        case 2:
                            strengthBar.value = 66;
                            strengthText.innerHTML = '密码安全程度：中';
                            break;
                        case 3:
                            strengthBar.value = 100;
                            strengthText.innerHTML = '密码安全程度：强';
                            break;
                        default:
                            strengthBar.value = 0;
                            strengthText.innerHTML = '密码安全程度：';
                    }
                });
            }
        });
</script>

<script>
    //绑定提交按钮点击事件
    function loginOnclick(){
        let email = document.querySelector("#email").value;
        let password = document.querySelector("#password").value;
        //发送ajax请求，需要设置method，url，contentType，body
        ajax({
            method: "post",
            url: "login?f=login",
            contentType: "application/json",
            body: JSON.stringify({
                //冒号前是前后端约定的键，冒号后是变量值
                email: email,
                password: password
            }),
            callback: function(status,responseText){
                if(status == 200){
                    let json = JSON.parse(responseText);
                    if(json.ok){
                        //alert("登陆成功");
                        window.location.href = "blog.html";
                    }else {
                        alert("账号或密码错误");
                    }
                } else {
                    alert("响应状态码："+status);
                    window.location.href = '/'+this.url;
                }
            }
        });
    }

    function enrolled(){
        let username = document.querySelector("#username").value;
        let email = document.querySelector("#ZEmail").value;
        let newPassword = document.querySelector("#newPassword").value;

        ajax({
            method: "post",
            url: "login?f=enrolled",
            contentType: "application/json",
            body: JSON.stringify({
                //冒号前是前后端约定的键，冒号后是变量值
                username: username,
                password: newPassword,
                email: email
            }),
            callback: function (status, responseText) {
                if (status == 200) {
                    let json = JSON.parse(responseText);
                    if (json.ok) {
                        alert("注册成功");
                        window.location.href = "login.html";
                    } else {
                        alert("账号或密码错误");
                    }
                } else {
                    //alert("响应状态码："+status+"/nbody："+responseText);
                    console.log("响应状态码：" + status + "/nbody：" + responseText)
                }
            }
        });
    }

        let username = document.querySelector("#username").value;
        let email = document.querySelector("#ZEmail").value;
        let newPassword = document.querySelector("#newPassword").value;
        let cp = document.querySelector("#confirmPassword").value;
