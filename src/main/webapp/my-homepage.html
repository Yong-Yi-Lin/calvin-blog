<script>
			function appearComments() {
				let commentSection = document.querySelector(".comment-section");
				commentSection.style.display = "";
				let addComments = document.querySelector(".add-comment");
				addComments.style.display = "none";
				let cancleComments = document.querySelector(".cancle-comment");
				cancleComments.style.display = "";
			}
			function collapseComments() {
				let commentSection = document.querySelector(".comment-section");
				commentSection.style.display = "none";
				let addComments = document.querySelector(".add-comment");
				addComments.style.display = "";
				let cancleComments = document.querySelector(".cancle-comment");
				cancleComments.style.display = "none";
			}
				  let bar = document.querySelector('.bar');
				  let previousElement = null;
				
				  function updateBar(element,moduleId) {
				    // 获取所有li元素
				    let listItems = document.querySelectorAll('.mli');
				
				    // 移除所有li元素的active类
				    listItems.forEach(function(li) {
				      li.classList.remove('active');
				      // 将字体颜色恢复原样
				      li.querySelector('span').style.color = '';
				    });
				
				    // 给当前点击的li元素添加active类
				    element.classList.add('active');
				
				    // 将当前点击字体变为黑色
				    element.querySelector('span').style.color = 'black';
				
				    // 计算蓝色下划线应该位于的位置
				    let marginLeft = element.offsetLeft + (element.offsetWidth - bar.offsetWidth) / 2;
				
				    // 更新蓝色下划线的位置
				    bar.style.marginLeft = marginLeft + 'px';
				
				    // 如果存在先前点击的元素，将其字体颜色恢复原样
				    if (previousElement && previousElement !== element) {
				      previousElement.querySelector('span').style.color = '';
				    }
				
				    // 更新先前点击的元素为当前点击的元素
				    previousElement = element;
					
					// 隐藏所有模块
					document.querySelectorAll('.module').forEach(function (module) {
					  module.classList.remove('active');
					});
							
					// 显示点击对应的模块
					let targetModule = document.getElementById(moduleId);
					if (targetModule) {
					  targetModule.classList.add('active');
					} else {
					  console.error('Module not found:', moduleId);
					}

				  }
				</script>

		<script>
			//客户端展示页面时，就需要展示文章列表数据
			//加载完页面，就发送ajax请求获取文章列表的数据
			//返回响应执行回调时，解析响应的文章列表数据
			let id = window.location.search.substring(4);
			function onloadMyHome(){
				let nickname = document.getElementById("nickname");
				let avatar = document.getElementById("avatarImg");
				let essay = document.querySelector(".essay");
				let bio = document.querySelector(".a1");
				ajax({
					method: "Get",
					url: "blog_myList",
					callback: function(status,responseText){
						if(status == 200){
							let json = JSON.parse(responseText);
							if(json.ok){
								let data = json.data;
								let articles = data.articles;
								let user = data.user;

								nickname.innerText = user.username;
								bio.innerText = user.biography;
								if(user.avatar!=null){
									avatar.src = user.avatar;
								}
								//str不赋值就是undefined，再去拼接字符串就会出错
								let str = "";
								for(let a of articles){
									//``里面可以包括单引号和双引号
									str += `<div class="title">`;
									str += a.title;
									str += `<span class="date">`;
									str += a.dateString;
									str += `</span></div>`;
									//str += `<img src="./apple-touch-icon.png" class="avatar2">`;
									str += `<div class="desc">`;
									str += `<span>`;
									str += a.content;
									str += `</span>`
									str += `</p>`;
									// str += `<a href="essay.html"><button class="read-all">&#9660;阅读全文</button></a><br>`;
									str += `<a href="essay.html?id=` +a.id;
									str += `"><button class="read-all">&#9660;阅读全文</button></a><br>`;
									str += `</div>`
									str += `<div class="btn-all"><button class="approve">&#x1F44D;点赞<span>`;
									str += a.likeCount;
									str += `</span></button>`;
									str += `<button class="add-comment" onclick="appearComments()">&#x1F4AC;添加评论<span>0</span></button>`;
									str += `<button class="cancle-comment" onclick="collapseComments()"`;
								    str += `style=display: none">&#x1F4AC;收起评论</button>`;
									str += `<a href="blog_edit.html?id=`+a.id;
									str += `"><button class="shares">&#x270E;编辑</button></a>`
									str += `<button class="favorite" onclick=DeleteArticle(`;
									str += a.id
									str += `)>&#x1F6AE;删除</button>`;
									str += `</div>`;
								}
								essay.innerHTML = str;
							}else {
								alert("ok==false");
							}
						}else {
							alert("响应状态码："+status+"/nbody："+responseText)
						}
					}
				});
			}
			function DeleteArticle(id) {
				ajax({
					method: "Get",
					url: "blog_delete?id=" + id,
					contentType: "application/json",
					callback: function (status, responseText) {
						if (status == 200) {
							let json = JSON.parse(responseText);
							if (json.ok) {
								alert("删除文章成功");
								window.location.href = "my-homepage.html";
							} else {
								alert("ok == false");
							}
						} else {
							alert("响应状态码：" + status + "/nbody：" + responseText);
						}
					}
				});
			}
		</script>
