<script>
    function toggleEditMode() {
        let elements = document.getElementsByClassName("editable");
        let saveChangesBtn = document.getElementById("saveChangesBtn");

        for (let i = 0; i < elements.length; i++) {
            elements[i].contentEditable = !elements[i].isContentEditable;
        }

        saveChangesBtn.style.display = saveChangesBtn.style.display === "none" ? "block" : "none";
    }

    function toggleLanguage() {
        // 实现语言切换
        alert("Implement the language toggle functionality.");
    }

    function saveChanges() {
        // 实现保存更改
        let elements = document.getElementsByClassName("editable");

        for (let i = 0; i < elements.length; i++) {
            elements[i].contentEditable = false;
        }

        let saveChangesBtn = document.getElementById("saveChangesBtn");
        saveChangesBtn.style.display = "none";
    }
</script>
<script>

			//演示
            alert('当前密码：' + currentPassword + '\n新密码：' + newPassword);
        }
    </script>
	<script>
	    function confirmLogout() {
	        let isConfirmed = confirm("确定要注销账号吗？这将永久删除您的账号及相关信息。");
	        if (isConfirmed) {

	    }
	</script>
	 <script>
	        function saveAvatar() {
	            let fileInput = document.getElementById('avatarInput');
	            let avatarImg = document.getElementById('avatarImg');
	
	            // 获取用户选择的文件
	            let file = fileInput.files[0];
	
	            if (file) {
	                // 创建一个 FileReader 对象来读取文件
	                let reader = new FileReader();	
	                reader.onload = function (e) {
	                    // 将读取到的文件内容设置为新头像的 src
	                    avatarImg.src = e.target.result;
	
	                    // 同时更新其他位置的头像
	                    updateOtherAvatar(e.target.result);
	                };
	                // 读取文件内容
	                reader.readAsDataURL(file);
	            }
	        }
	
	        function updateOtherAvatar(newAvatarSrc) {
	            // 获取其他位置的头像元素，并更新其 src 属性
	            let otherAvatar1 = document.getElementById('otherAvatar1');
	            let otherAvatar2 = document.getElementById('otherAvatar2');
	
	            if (otherAvatar1 && otherAvatar2) {
	                otherAvatar1.src = newAvatarSrc;
	                otherAvatar2.src = newAvatarSrc;
	            }
	        }
	    </script>
