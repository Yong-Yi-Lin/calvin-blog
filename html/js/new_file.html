<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login and Register</title>
    <link rel="stylesheet" >
    <!-- 添加你的其他样式链接 -->
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 400px; /* 修改容器宽度为 400px */
        }

        .form-header {
            background-color: #007bff;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        .form-container {
            padding: 20px;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            color: #555;
        }

        input {
            padding: 10px;
            margin-bottom: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        input[type="submit"] {
            background-color: #007bff;
            color: #fff;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #0056b3;
        }

        .form-footer {
            text-align: center;
            padding: 20px;
            background-color: #f4f4f4;
            border-top: 1px solid #ddd;
        }

        .form-footer a {
            color: #007bff;
            text-decoration: none;
        }

        .form-footer p {
            margin: 10px 0;
        }

        .form-footer span {
            color: #555;
        }

        /* 新增样式 */
        .register-form label {
            display: flex;
            align-items: center;
        }

        .register-form input[type="checkbox"] {
            margin-right: 8px;
        }

        .captcha-container {
            display: flex;
            align-items: center;
        }

        .captcha-input {
            flex: 1;
            margin-right: 8px;
        }

        .captcha-image {
            height: 38px;
            border: 1px solid #ccc;
            border-radius: 4px;
            overflow: hidden;
        }

        .captcha-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="form-header">
            <h1>Login and Register</h1>
        </div>
        <div class="form-container">
            <!-- 登录表单 -->
            <div id="login-form">
                <h2>Login</h2>
                <form action="login.php" method="post">
                    <label for="login-username">Username:</label>
                    <input type="text" id="login-username" name="login-username" required>

                    <label for="login-password">Password:</label>
                    <input type="password" id="login-password" name="login-password" required>

                    <label for="remember">
                        <input type="checkbox" id="remember" name="remember"> Remember me
                    </label>

                    <p><a href="#">Forgot password?</a></p>

                    <input type="submit" value="Login">
                </form>
            </div>

            <!-- 注册表单 -->
            <div id="register-form" style="display: none;">
                <h2>Register</h2>
                <form action="register.php" method="post">
                    <label for="register-username">Username:</label>
                    <input type="text" id="register-username" name="register-username" required>

                    <label for="register-password">Password:</label>
                    <input type="password" id="register-password" name="register-password" required>

                    <label for="confirm-password">Confirm Password:</label>
                    <input type="password" id="confirm-password" name="confirm-password" required>

                    <div class="captcha-container">
                        <input type="text" id="captcha" name="captcha" class="captcha-input" placeholder="Enter the code" required>
                        <div class="captcha-image">
                            <!-- 添加验证码图片的生成 -->
                            <img src="generate_captcha.php" alt="Captcha">
                        </div>
                    </div>

                    <label for="privacy-policy">
                        <input type="checkbox" id="privacy-policy" name="privacy-policy" required> I have read and accept the <a href="#">Privacy Policy</a>
                    </label>

                    <input type="submit" value="Register">
                </form>
            </div>
        </div>
        <div class="form-footer">
            <p>Already have an account? <a href="javascript:void(0);" onclick="toggleForm()">Login here</a></p>
            <span>By signing up, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</span>
        </div>
    </div>

    <script>
        function toggleForm() {
            var loginForm = document.getElementById('login-form');
            var registerForm = document.getElementById('register-form');

            if (loginForm.style.display === 'block') {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
            } else {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
            }
        }
    </script>

</body>
</html>
