<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title></title>
  
  <!-- 引入 Font Awesome CSS 文件 -->
  <link rel="stylesheet" href="path/to/font-awesome/css/font-awesome.min.css">
  
  <style>
    /* 添加适当的样式 */
    span.fa {
      /* 指定 Font Awesome 字体系列 */
      font-family: "FontAwesome";
    }
  
    span {
      width: 50px;
    }
    
    /* 可以根据需要设置其他样式，比如颜色和大小 */
    span.fa.fa-weixin {
      color: #020202;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <span class="fa fa-weixin"></span>
</body>
</html>
